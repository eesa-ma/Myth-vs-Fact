<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Clean Minimalist Square Base (Rounded) -->
  <rect x="40" y="40" width="432" height="432" rx="100" fill="#0d9488"/>
  
  <!-- Stylized Minimalist Stickman Icon (White) -->
  <g transform="translate(256, 256)">
    <!-- Thinking Pose - Abstracted -->
    <!-- Head -->
    <circle cx="0" cy="-110" r="55" fill="white"/>
    
    <!-- Body -->
    <path d="M0,-55 L0,80" stroke="white" stroke-width="24" stroke-linecap="round"/>
    
    <!-- Thinking Arm (Curved towards head) -->
    <path d="M0,-10 Q60,-10 60,-80" fill="none" stroke="white" stroke-width="24" stroke-linecap="round"/>
    
    <!-- Other Arm -->
    <path d="M0,-10 L-60,40" stroke="white" stroke-width="24" stroke-linecap="round"/>
    
    <!-- Legs (Solid Base) -->
    <path d="M0,80 L-50,160" stroke="white" stroke-width="24" stroke-linecap="round"/>
    <path d="M0,80 L50,160" stroke="white" stroke-width="24" stroke-linecap="round"/>
  </g>
  
  <!-- Small Orange Accent (The "Truth" Spark) -->
  <circle cx="360" cy="140" r="15" fill="#fbbf24" />
</svg>
