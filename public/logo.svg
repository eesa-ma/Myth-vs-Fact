<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f766e;stop-opacity:1" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Professional Minimalist Base -->
  <circle cx="256" cy="256" r="220" fill="url(#logoGrad)" filter="url(#softShadow)"/>
  
  <!-- Stylized Minimalist Stickman (Geometric) -->
  <g transform="translate(156, 130) scale(2)">
      <!-- Head -->
      <circle cx="50" cy="40" r="22" fill="white"/>
      
      <!-- Body (Clean Stroke) -->
      <path d="M50,65 L50,110" stroke="white" stroke-width="12" stroke-linecap="round"/>
      
      <!-- Arms (Abstracted V shape for stability/professionalism) -->
      <path d="M25,85 L50,65 L75,85" stroke="white" stroke-width="12" stroke-linecap="round" fill="none"/>
      
      <!-- Legs (Clean Lines) -->
      <path d="M50,110 L35,145" stroke="white" stroke-width="12" stroke-linecap="round"/>
      <path d="M50,110 L65,145" stroke="white" stroke-width="12" stroke-linecap="round"/>
  </g>
  
  <!-- Subtle Border Highlight -->
  <circle cx="256" cy="256" r="214" fill="none" stroke="white" stroke-width="4" stroke-opacity="0.2"/>
</svg>
