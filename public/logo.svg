<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded Card Shape Background -->
  <rect x="64" y="32" width="384" height="448" rx="40" fill="#ffffff" stroke="#0d9488" stroke-width="12"/>
  
  <!-- Internal Gradient for "Tabletop" feel -->
  <rect x="84" y="52" width="344" height="408" rx="32" fill="url(#cardGradient)"/>
  
  <defs>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f766e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Stickman Group in Center (White) -->
  <g transform="translate(156, 100) scale(2)">
      <!-- Body -->
      <line x1="50" y1="60" x2="50" y2="130" stroke="white" stroke-width="8" stroke-linecap="round"/>
      <!-- Legs -->
      <line x1="50" y1="130" x2="25" y2="190" stroke="white" stroke-width="8" stroke-linecap="round"/>
      <line x1="50" y1="130" x2="75" y2="190" stroke="white" stroke-width="8" stroke-linecap="round"/>
      <!-- Arms -->
      <line x1="50" y1="80" x2="20" y2="60" stroke="white" stroke-width="8" stroke-linecap="round"/>
      <polyline points="50,80 80,60 70,30" stroke="white" stroke-width="8" stroke-linecap="round" fill="none"/>
      <!-- Head -->
      <circle cx="50" cy="35" r="25" fill="#0d9488" stroke="white" stroke-width="8"/>
      <!-- Confused Face -->
      <circle cx="40" cy="30" r="3" fill="white"/>
      <circle cx="60" cy="30" r="3" fill="white"/>
      <path d="M40 45 Q50 40 60 45" stroke="white" stroke-width="3" fill="none"/>
      <!-- Question Marks (Orange accent) -->
      <text x="80" y="30" font-family="sans-serif" font-size="24" font-weight="black" fill="#fbbf24">?</text>
  </g>

  <!-- Logo Text Overlay -->
  <rect x="120" y="380" width="272" height="60" rx="15" fill="white" filter="url(#shadow)"/>
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="32" font-weight="900" fill="#0d9488" text-anchor="middle" letter-spacing="2">MYTH VS FACT</text>
</svg>
