<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Professional Card Stack Approach -->
  <!-- Bottom Card (Teal Dark) -->
  <rect x="120" y="80" width="300" height="400" rx="40" fill="#064e3b" transform="rotate(-10, 256, 280)"/>
  
  <!-- Middle Card (Teal Medium) -->
  <rect x="100" y="60" width="300" height="400" rx="40" fill="#0d9488" transform="rotate(-5, 256, 260)"/>
  
  <!-- Top Card (White) -->
  <rect x="80" y="40" width="300" height="400" rx="40" fill="#ffffff" stroke="#0d9488" stroke-width="8"/>
  
  <!-- Minimalist Stickman Icon on Top Card -->
  <g transform="translate(180, 140) scale(1.4)">
    <!-- Head -->
    <circle cx="50" cy="40" r="25" fill="#0d9488"/>
    
    <!-- Body -->
    <rect x="42" y="70" width="16" height="60" rx="8" fill="#0d9488"/>
    
    <!-- Abstract Arms (Forming a stable horizontal line) -->
    <rect x="20" y="80" width="60" height="12" rx="6" fill="#0d9488"/>
    
    <!-- Simple Base (Abstracted legs) -->
    <path d="M42,130 L30,170" stroke="#0d9488" stroke-width="12" stroke-linecap="round"/>
    <path d="M58,130 L70,170" stroke="#0d9488" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
